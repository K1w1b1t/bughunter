## 2. `config/hunterops_llm_config.yaml` (NEW FILE)

```yaml
# HunterOps LLM Configuration
# For AI-powered decision making and finding validation

llm:
  # =====================================================
  # PROVIDER SETTINGS
  # =====================================================
  enabled: true
  provider: "anthropic"                       # anthropic | openai | local
  model: "claude-3-5-sonnet-20241022"         # Latest stable model
  
  # =====================================================
  # CONFIDENCE THRESHOLDS
  # =====================================================
  # When does the system call LLM? When does it accept verdict?
  
  min_heuristic_confidence_for_llm: 0.50
  # If pattern-matching confidence < 0.50, skip LLM (assume false positive)
  
  min_llm_confidence_required: 0.80
  # Final confidence must be >= 0.80 for POC_VALID
  
  # =====================================================
  # API RATE LIMITING (Protect budget)
  # =====================================================
  max_llm_calls_per_minute: 20                # Burst protection
  max_llm_calls_per_day: 1000                 # Daily quota
  
  # What to do when rate limit hit?
  rate_limit_behavior: "backoff"              # backoff | skip | alert
  
  # =====================================================
  # TIMEOUT & PERFORMANCE
  # =====================================================
  timeout_seconds: 15                         # Max wait for response
  retry_on_timeout: true
  max_retries: 2
  
  # =====================================================
  # CACHING (Reduce API calls)
  # =====================================================
  cache:
    enabled: true
    backend: "sqlite"                         # sqlite | redis (future)
    ttl_seconds: 3600                         # Cache for 1 hour
    max_entries: 10000
    
    # What to cache?
    cache_triage_decisions: true              # Same endpoint pattern
    cache_escalation_decisions: true
    cache_llm_responses: true

anthropic:
  # =====================================================
  # ANTHROPIC-SPECIFIC SETTINGS
  # =====================================================
  api_key_env: "ANTHROPIC_API_KEY"
  
  # Model parameters
  max_tokens: 500                             # Response length limit
  temperature: 0.3                            # 0=deterministic, 1=creative
                                              # 0.3 = good for security analysis
  
  # System prompt
  system_prompt_path: "SYSTEM_PROMPT.md"      # Main decision framework
  system_prompt_version: "1.0"
  
  # Request parameters
  top_p: 0.9                                  # Nucleus sampling
  top_k: 20

fallback:
  # =====================================================
  # WHAT IF LLM FAILS?
  # =====================================================
  strategy: "heuristic"
  # Options:
  # - "heuristic": Use pattern-matching confidence (risky, false positives)
  # - "conservative": Assume false_positive (safe, may miss real vulns)
  
  # Retry configuration
  enable_retry: true
  retry_delay_seconds: 5
  max_retries: 3
  
  # Fallback model (future: for redundancy)
  fallback_provider: null                     # null = none configured
  
  # Alert on fallback
  alert_on_fallback: true
  alert_channel: "errors"

logging:
  # =====================================================
  # DEBUG & AUDIT
  # =====================================================
  enabled: true
  log_prompts: false                          # Don't log full prompts (privacy)
  log_responses: false                        # Don't log full responses
  log_api_calls: true                         # Log call count + tokens
  log_cache_hits: true
  
  # Metrics
  track_confidence_scores: true
  track_verdict_distribution: true            # POC_VALID vs False_Positive ratio

```

