## 6. Loading Configuration in Python

```python
# hunterops/config_loader.py

import yaml
from pathlib import Path

def load_engine_config() -> dict:
    """Load runtime engine configuration."""
    path = Path("config/engine.yaml")
    with open(path, 'r') as f:
        return yaml.safe_load(f)

def load_llm_config() -> dict:
    """Load LLM-specific configuration."""
    path = Path("config/hunterops_llm_config.yaml")
    with open(path, 'r') as f:
        return yaml.safe_load(f)

def load_programs() -> list[dict]:
    """Load managed programs."""
    path = Path("config/programs.yaml")
    with open(path, 'r') as f:
        data = yaml.safe_load(f)
        return data.get("programs", [])

# Usage
if __name__ == "__main__":
    engine_cfg = load_engine_config()
    llm_cfg = load_llm_config()
    programs = load_programs()
    
    print(f"Rate limit: {engine_cfg['runtime']['rate_limit_per_sec']} req/s")
    print(f"LLM enabled: {llm_cfg['llm']['enabled']}")
    print(f"Programs loaded: {len(programs)}")
```

