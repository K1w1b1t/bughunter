## 1. `config/engine.yaml` (DEFINITIVE VERSION WITH LLM)

```yaml
# HunterOps Engine Configuration
# Version: 2.0 (with LLM integration)
# Last Updated: 2026-03-20

runtime:
  # Concurrency & Performance
  concurrency: 6                              # MAX workers
  timeout_seconds: 45                         # Per-request timeout
  task_timeout_seconds: 240                   # Per-task timeout
  batch_heartbeat_seconds: 15                 # Health check interval
  
  # Plugin system
  plugin_metrics_enabled: true
  plugin_profile: full
  
  # =====================================================
  # RATE LIMITING (CRITICAL - DO NOT CHANGE)
  # =====================================================
  rate_limit_per_sec: 10                      # HARD LIMIT: 10 req/s
  global_http_rate_limit_per_sec: 10          # HARD LIMIT: 10 req/s
  global_http_max_inflight: 10                # HARD LIMIT: 10 concurrent
  
  # =====================================================
  # ADAPTIVE LEVELS (Orchestration Logic)
  # =====================================================
  adaptive_levels:
    enabled: true
    min_level: 1                              # Level 1 = Passive Recon
    max_level: 3                              # Level 3 = Aggressive Fuzzing
    start_level: 1                            # Always start passive
    escalate_after_clean_rounds: 1            # How many rounds without findings?
    demote_on_feedback: true                  # Program complains → downgrade
    demote_on_timeout: true                   # Many timeouts → downgrade
  
  # =====================================================
  # ENDPOINT CACHE (Reuse previous discoveries)
  # =====================================================
  endpoint_cache_enabled: true
  endpoint_cache_ttl_hours: 24                # Cache valid for 24 hours
  endpoint_cache_max_entries: 50000
  
  # =====================================================
  # PERSISTENCE & RECOVERY
  # =====================================================
  persist_tasks: true                         # Save state between restarts
  task_store_backend: auto                    # Auto-detect SQLite vs PostgreSQL
  task_store_path: data/processed/task_queue.db
  
  # =====================================================
  # PLUGINS TO SEED (Initial modules)
  # =====================================================
  seed_plugins:
    - asset_discovery_engine
    - recon_engine
    - surface_massive
    - surface_mapper
    - surface_expansion
    - hidden_route_discovery
    - hidden_route_detector
    - crawler_intelligent
    - intelligent_crawler
    - deep_js_intelligence
    - deep_js_analyzer
    - javascript_deep_analysis
    - js_route_mapper
    - parameter_enum
    - undocumented_api
    - graphql_scan
    - cors
    - takeover
  
  # =====================================================
  # DEFAULT PLUGINS (Always run)
  # =====================================================
  default_plugins:
    - recon
    - fingerprint
    - scan
    - cors
    - takeover
    - playwright_capture
    - business_logic_sniper
    - race_condition_turbo
  
  # =====================================================
  # SCOPE & AUTHORIZATION (CRITICAL)
  # =====================================================
  scope_enforce_http: true                    # Only allow http/https
  scope_allowlist_patterns: []                # Additional whitelists (optional)
  
  # =====================================================
  # CONFIGURATION FILES
  # =====================================================
  programs_file: config/programs.yaml
  attack_chain_config: attack_pipeline.yaml
  modules_spec_path: modules_spec.json
  findings_schema_path: findings.schema.json
  
  # =====================================================
  # VALIDATION & DATA RETENTION
  # =====================================================
  config_validation_enabled: true
  config_validation_strict: false             # Log warnings vs errors
  findings_validation_strict: false
  findings_retention_hours: 0                 # 0 = infinite retention
  evidence_retention_hours: 0
  reports_retention_hours: 0
  
  # =====================================================
  # ATTACK CHAIN (Exploitation sequencing)
  # =====================================================
  attack_chain_seed_enabled: true
  attack_chain_seed_max_endpoints: 80         # Max endpoints per chain
  attack_chain_auto_run: true                 # Auto-execute chains
  
  # =====================================================
  # PRIORITY PATTERNS (What to target first)
  # =====================================================
  priority_endpoint_patterns:
    - "admin"
    - "internal"
    - "v1/debug"
    - "config"
    - "staging"
    - "export"
    - "graphiql"
  priority_endpoint_boost: 12                 # Boost score by 12%
  
  # =====================================================
  # ROI PATTERNS (High-value endpoints)
  # =====================================================
  roi_endpoint_patterns:
    - "payment"
    - "checkout"
    - "api/v1/users"
    - "api/v1/orders"
    - "api/v1/transactions"
  
  # =====================================================
  # NOISE REDUCTION (False positive filters)
  # =====================================================
  endpoint_noise_patterns: []

---

# =====================================================
# LLM CONFIGURATION (NEW)
# =====================================================

llm:
  enabled: true
  provider: "anthropic"                       # "anthropic" or "openai"
  model: "claude-3-5-sonnet-20241022"
  
  # =====================================================
  # DECISION THRESHOLDS
  # =====================================================
  min_heuristic_confidence_for_llm: 0.50      # If heuristic < 0.50, skip LLM
  min_llm_confidence_required: 0.80            # Threshold for POC_VALID
  
  # =====================================================
  # RATE LIMITING (API credits protection)
  # =====================================================
  max_llm_calls_per_minute: 20
  max_llm_calls_per_day: 1000
  timeout_seconds: 15                         # Max wait for LLM response
  
  # =====================================================
  # CACHING (Reduce API calls)
  # =====================================================
  cache_enabled: true
  cache_ttl_seconds: 3600                     # 1 hour
  cache_backend: sqlite                       # Local caching
  
  # =====================================================
  # FALLBACK BEHAVIOR (If LLM fails)
  # =====================================================
  fallback_strategy: "heuristic"              # Use pattern-matching only
  # Options: "heuristic" (be smart), "conservative" (assume false_positive)

anthropic:
  api_key_env: "ANTHROPIC_API_KEY"
  max_tokens: 500
  temperature: 0.3                            # Lower = more consistent

---

# =====================================================
# NUCLEI CONFIGURATION
# =====================================================

nuclei:
  enabled: true
  version: "3.x"
  
  # severity levels to include
  severities:
    - critical
    - high
    - medium
    - low
  
  # Template curation
  templates_path: "config/nuclei-curation.yaml"
  
  # Performance
  rate_limit: 10
  timeout: 45
  max_retries: 2

---

# =====================================================
# HTTPX CONFIGURATION
# =====================================================

httpx:
  enabled: true
  
  # Port discovery
  ports:
    - 80
    - 443
    - 8080
    - 8443
    - 3000
    - 5000
  
  # Detection options
  detect_status_code: true
  detect_technologies: true
  collect_headers: true

---

# =====================================================
# SUBFINDER CONFIGURATION
# =====================================================

subfinder:
  enabled: true
  method: passive                             # passive only (no active scanning)
  
  # Sources to query
  sources:
    - alienvault
    - censys
    - certspotter
    - crtsh
    - dnsdumpster
    - hackertarget
    - intelx
    - shodan
    - virustotal
    - zoomeye

---

# =====================================================
# DISCORD NOTIFICATIONS (NEW)
# =====================================================

discord:
  enabled: true
  bot_name: "Pinguinho"
  
  # Webhook URLs (from environment variables)
  recon_webhook_url: "${DISCORD_RECON_WEBHOOK}"
  recon_webhook_env: "DISCORD_RECON_WEBHOOK"
  
  findings_webhook_url: "${DISCORD_FINDINGS_WEBHOOK}"
  findings_webhook_env: "DISCORD_FINDINGS_WEBHOOK"
  
  operations_webhook_url: "${DISCORD_OPS_WEBHOOK}"
  operations_webhook_env: "DISCORD_OPS_WEBHOOK"
  
  errors_webhook_url: "${DISCORD_ERRORS_WEBHOOK}"
  errors_webhook_env: "DISCORD_ERRORS_WEBHOOK"
  
  # Performance
  timeout_seconds: 4.0
  max_concurrent: 4
  send_startup_check: true
  
  # Deduplication (prevent spam)
  recon_dedupe_ttl_seconds: 1800              # 30 minutes
  findings_dedupe_ttl_seconds: 86400          # 24 hours
  findings_dedupe_persist_max_entries: 20000
  findings_dedupe_persist_file: "data/processed/discord_finding_dedupe.json"

---

# =====================================================
# DATABASE (PostgreSQL)
# =====================================================

database:
  enabled: true
  type: "postgresql"
  
  # Connection (from environment)
  host: "${POSTGRES_HOST}"
  port: "${POSTGRES_PORT}"
  username: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"
  database: "hunterops"
  
  # Pool settings
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  
  # Retention policies
  findings_retention_days: 0                  # 0 = infinite
  events_retention_days: 90
  sessions_retention_days: 180

---

# =====================================================
# LOGGING & AUDIT
# =====================================================

logging:
  level: "INFO"
  format: "json"  # json or text
  
  # File rotation
  max_bytes: 10485760  # 10 MB
  backup_count: 10
  
  # Audit trail
  audit_enabled: true
  audit_path: "data/logs/audit_{date}.log"
  
  # Don't log these patterns (security)
  redact_patterns:
    - "bearer "
    - "authorization: "
    - "api.key"
    - "secret"
    - "password"

---

# =====================================================
# METRICS & OBSERVABILITY
# =====================================================

metrics:
  enabled: true
  
  # Prometheus
  prometheus_port: 9090
  prometheus_enabled: true
  
  # Grafana
  grafana_enabled: true
  grafana_dashboard_path: "grafana/dashboard.json"

---

# =====================================================
# SESSION & STATE MANAGEMENT
# =====================================================

session:
  # Session lifetime
  session_timeout_seconds: 86400              # 24 hours
  session_idle_timeout_seconds: 3600          # 1 hour idle
  
  # Persistence
  persist_sessions: true
  session_store_path: "data/sessions.yaml"
  
  # Health checks
  health_check_interval_seconds: 300          # 5 minutes

---

# =====================================================
# COMPLIANCE & SECURITY
# =====================================================

compliance:
  # Scope validation
  strict_scope_matching: true
  require_signed_scope: true
  
  # Rules of engagement
  check_automation_allowed: true
  
  # Rate limit enforcement
  enforce_rate_limits: true
  circuit_breaker_enabled: true
  circuit_breaker_threshold: 10               # errors before circuit opens
  
  # Secrets protection
  redact_secrets_in_logs: true
  redact_secrets_in_discord: true

