# Alembic Configuration
# ===================================================================
# This is the Alembic configuration file for HunterOps-AI database
# migrations using SQLAlchemy 2.0 (async mode)
# ===================================================================

[alembic]
# path to migration scripts
script_location = database/alembic

# template to use to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# sys.path path separator to include as part of the path
# prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to be passed to datetime.datetime.now(datetime.timezone(datetime.timedelta(0))).astimezone()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by Alembic and passed
# to file_template
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to ignore whitespace-only diffs when
# generating the new migration file. This file is
# provided with default implementation in alembic/env.py
# ignore_whitespace = false

# set to true value finally to enable sqlalchemy 2.0
# behavior even when it is not installed by default
sqlalchemy.url = driver://user:password@localhost/dbname

# When set to 'true', this option enables the environment's
# compare_type flag, which is used to detect changes in column types
# For SQLAlchemy 2.0, set to true for stricter comparison
compare_type = true

# When set to 'true', this option enables the environment's
# compare_server_default flag, which is used to detect changes in
# column server defaults
compare_server_default = true

# [loggers]
