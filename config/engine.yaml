modules:
  attack_chain_seed:
    output_file: data/processed/attack_chain_discovered.txt
    max_endpoints: 120
    auto_run: true
    max_auto_run: 3
    auto_run_require_scope: true
    auto_run_require_program: true
    attack_chain_config: attack_pipeline.yaml
  asset_discovery_engine:
    subdomain_prefixes:
    - www
    - api
    - app
    - admin
    - staging
    - dev
    - trade
    - trading
    - payment
    - open-api
    - backend
    - internal
    allowed_scope_suffixes:
    - backend-capital.com
    - capital.com
    - itcapital.io
  recon_engine:
    seed_paths:
    - /
    - /api
    - /v1/api
    - /graphql
    - /openapi.json
    - /swagger.json
    max_pages: 55
    recursive_discovery_commands:
    - subfinder -d {target} -recursive -all -silent
    - amass enum -passive -src -d {target}
    - assetfinder --subs-only {target}
    recursive_suffix_allowlist:
    - backend-capital.com
    - itcapital.io
    - capital.com
    recursive_max_hosts: 160
    misconfig_probe_paths:
    - /.git/HEAD
    - /.git/config
    - /.env
    - /.env.local
    - /.env.backup
    - /.env.production
    - /phpinfo.php
    - /info.php
    - /server-status
    - /actuator/env
    - /actuator/configprops
    misconfig_probe_statuses:
    - 200
    - 206
    - 401
    - 403
    - 500
    misconfig_probe_max_hosts: 220
    mass_pinger_suffixes:
    - capital.com
    - itcapital.io
    - backend-capital.com
    authenticated_crawling: true
    sessions_file: data/sessions.yaml
  surface_massive:
    commands:
    - subfinder -d {target} -recursive -all -silent
    - amass enum -passive -src -d {target}
    - assetfinder --subs-only {target}
    - gau {target}
    - waybackurls {target}
    - katana -u https://{target} -silent
  crawler_intel:
    commands:
    - katana -u https://{target} -silent -jc
    - hakrawler -url https://{target} -plain
    - gospider -s https://{target} -q
  crawler_intelligent:
    max_pages: 25
    max_depth: 2
  intelligent_crawler:
    max_pages: 20
    max_depth: 2
    crawl_delay_ms: 120
  javascript_deep_analysis:
    max_scripts: 25
    seed_paths:
    - /sap/bc/ui5_ui5/sap/zc_ad_appl/
    - /sap/bc/ui5_ui5/sap/zc_ad_appl/index.html
    - /sap/bc/ui5_ui5/sap/zc_ad_appl/Component.js
    - /sap/opu/odata/sap/ZC_AD_APPLICANT_SRV/$metadata
  deep_js_analyzer:
    max_scripts: 80
    seed_paths:
    - /
    - /app.js
    - /main.js
    - /static/js/main.js
    - /assets/index.js
    - /v1/api
    - /graphql
  deep_js_intelligence:
    max_scripts: 120
    max_source_maps: 40
    entropy_threshold: 3.6
    request_delay_seconds: 0.05
    include_source_maps: true
    include_comment_leaks: true
    include_metadata_keys: true
    seed_paths:
    - /
    - /app.js
    - /main.js
    - /static/js/main.js
    - /assets/index.js
    - /v1/api
    - /graphql
    focus_endpoint_keywords:
    - /graphql
    - /v1/api
    - /payment
    - /trade
    - /trading
    - /wallet
    - /transaction
  hidden_route_discovery:
    route_seeds:
    - /
    - /api
    - /v1/api
    - /graphql
    - /internal
    - /staging
  hidden_route_detector:
    route_seeds:
    - /
    - /api
    - /v1/api
    - /graphql
    - /internal
    source_paths:
    - /
    - /app.js
    - /main.js
    - /static/js/main.js
    - /assets/index.js
  parameter_enum:
    seed_paths:
    - /api
    - /v1/api
    - /graphql
    - /v1/api/accounts?id=1
    - /v1/api/payments?id=1
  surface_expansion:
    seed_endpoints:
    - /
    - /api
    - /v1/api
    - /graphql
    - /openapi.json
  js_route_mapper:
    max_scripts: 30
  surface_mapper:
    seed_paths:
    - /
    - /api
    - /v1/api
    - /graphql
  attack_graph_builder:
    findings_source: data/reports/engine/findings.json
  parameter_intelligence:
    seed_paths:
    - /api
    - /v1/api
    - /graphql
    - /v1/api/trading/orders?userId=1001
    - /v1/api/payments/transactions?accountId=1001
    evidence_dir: data/evidence/engine
    max_seed_paths: 24
    max_script_fetch: 24
    max_safe_probes: 36
  entity_cross_pollinator:
    cross_pollination_depth: 5
    max_entities: 120
    max_endpoints: 180
    fanout_per_endpoint: 4
    max_generated_tasks: 220
    max_probe_requests: 80
    sessions_file: data/sessions.yaml
    auth_context_b: user_b
    target_plugins:
    - parameter_intelligence
    - differential_auth_prover
  differential_auth_prover:
    sessions_file: data/sessions.yaml
    auth_context_a: user
    auth_context_b: user_b
    session_owner: user
    session_other: user_b
    tier1_scope_suffixes:
    - backend-capital.com
    tier2_scope_suffixes:
    - capital.com
    enforce_scope_suffixes: true
    financial_endpoint_focus_only: true
    min_structure_similarity_pct: 88
    min_content_similarity_pct: 85
    flag_length_header_diff: true
    min_length_diff_bytes: 1
    min_header_count_diff: 1
    low_signal_confidence_floor: 62
    max_candidates: 80
    max_entities: 180
    max_probes: 110
    max_probes_tier1: 260
    max_probes_tier2: 170
    high_risk_param_types:
    - numeric_id
    - identifier
    - uuid
    - token
  session_guardian:
    enabled: true
    sessions_file: data/sessions.yaml
    vault_file: config/vault.yaml
    session_names:
    - user
    - user_b
    heartbeat_paths:
    - /v1/api/profile
    - /
    unauthorized_statuses:
    - 401
    - 403
    login_indicators:
    - /login
    - /signin
    - /auth
    - saml
    - idp
    check_interval_seconds: 300
    heartbeat_timeout_seconds: 25
    headless: true
    browser_heartbeat: false
    disable_browser_on_runtime_errors: true
    playwright_runtime_retry_seconds: 900
    capture_refresh_screenshot: false
    capture_report_screenshot: false
    max_report_screenshots: 24
    screenshot_dir: data/evidence/session_guardian
  impact_validator:
    enabled: true
    sessions_file: data/sessions.yaml
    auth_context_a: user
    auth_context_b: user_b
    timeout_seconds: 25
    max_replays_per_batch: 30
    similarity_threshold: 88
    safe_methods:
    - GET
    - HEAD
    require_json_response: true
    min_sensitive_signal_score: 3
    ignore_paths:
    - /
    - /index.html
    api_path_hints:
    - /api
    - /v1/api
    - /v2/api
    - /graphql
    - /open-api
    sensitive_query_params:
    - id
    - user_id
    - userid
    - account_id
    - accountid
    - wallet_id
    - walletid
    - trade_id
    - tradeid
    - position_id
    - positionid
    - transaction_id
    - transactionid
    - order_id
    - orderid
    - payment_id
    - paymentid
    - portfolio_id
    - portfolioid
    - email
    - phone
    - iban
    anon_success_status:
    - 200
    - 201
    anon_block_status:
    - 401
    - 403
    candidate_markers:
    - idor
    - bac
    - broken_object
    - data_exposure
    - object_level_authorization
    - authorization_matrix
  auth_matrix_engine:
    sessions_file: data/sessions.yaml
    auth_context_a: user
    auth_context_b: user_b
    min_structure_similarity_pct: 90
    min_confidence: 50
    verified_threshold: 85
    max_endpoints: 220
    max_probes: 140
    verified_dir: data/evidence/verified
  ade_brain:
    evidence_dir: data/evidence/ade
    max_spawn_tasks: 220
    max_boundary_candidates: 30
  report_engine:
    enabled: true
    evidence_dir: data/evidence/ade
    ready_dir: data/ready_to_submit
    state_file: data/processed/report_engine_state.json
    auto_submit_h1_draft: false
    draft_endpoint: https://api.hackerone.com/v1/reports/drafts
    identifier_env: H1_API_IDENTIFIER
    token_env: H1_API_TOKEN
  shannon_validator:
    enabled: true
    binary_path: /opt/shannon_ref/shannon
    timeout_seconds: 30
    max_candidates_per_run: 24
    thresholds:
      min_confidence: 55
      min_impact: 35
      min_severity: low
  hackerone_sync_engine:
    enabled: false
    strict_sync: false
    graphql_endpoint: https://api.hackerone.com/graphql
    sync_interval_seconds: 21600
    sync_key: h1_public_bounty_scope_sync
    targets_file: data/targets/in_scope_hosts.txt
    exclude_low_signal: false
    min_signal: 0
    attack_graph_confidence: 98
  hackerone_manager:
    enabled: false
    strict_scope_enforcement: true
    base_url: https://api.hackerone.com/v1
    api_user_env: HACKERONE_API_USER
    api_token_env: HACKERONE_API_TOKEN
    program_handles: []
    structured_scope_only: true
    poll_interval_seconds: 900
    scope_cache_file: data/processed/h1_scope_cache.json
    default_target_rps: 1.0
  intigriti_manager:
    enabled: false
    strict_scope_enforcement: true
    base_url: https://api.intigriti.com/external/researcher
    api_token_env: INTIGRITI_API_TOKEN
    program_handles:
    - capital-com
    include_hosts:
    - payment.backend-capital.com
    - open-api.capital.com
    exclude_hosts:
    - help.capital.com
    - aff.capital.com
    - go.capital.com
    - register.capital.com
    - careers.capital.com
    - 3cxby.itcapital.io
    - texis.itcapital.io
    poll_interval_seconds: 900
    scope_cache_file: data/processed/intigriti_scope_cache.json
    default_target_rps: 5.0
  oob_engine:
    enabled: false
    provider: custom
    callback_domain_env: HUNTEROPS_OOB_CALLBACK_DOMAIN
    poll_url_env: HUNTEROPS_OOB_POLL_URL
    api_token_env: HUNTEROPS_OOB_API_TOKEN
    callback_domain: ''
    poll_url: ''
    poll_interval_seconds: 30
    max_injections_per_target: 80
    max_concurrent_per_target: 3
    state_file: data/processed/oob_state.json
    events_file: data/processed/oob_events.jsonl
  smart_payload_engine:
    parameter_source: data/reports/engine/findings.json
    out_file: data/processed/smart_payloads.json
  context_aware_fuzzing_engine:
    payload_file: data/processed/smart_payloads.json
    sessions_file: data/sessions.yaml
    max_tests: 80
  behavioral_diff_engine:
    sessions_file: data/sessions.yaml
    paths:
    - /api/me
    - /v1/api/profile
    - /v1/api/trading/orders?id=1001
    - /v1/api/payments/transactions?accountId=1001
    - /graphql
  idor_intelligence:
    sessions_file: data/sessions.yaml
    candidate_urls:
    - https://{target}/v1/api/trading/orders?userId=1001
    - https://{target}/v1/api/trading/positions?accountId=1001
    - https://{target}/v1/api/payments/transactions?accountId=1001
    - https://{target}/v1/api/wallets?userId=1001
    - https://{target}/graphql
  vulnerability_detection_engine:
    findings_source: data/reports/engine/findings.json
  vulnerability_correlation_engine:
    findings_source: data/reports/engine/findings.json
  evidence_collector:
    findings_source: data/reports/engine/findings.json
    out_dir: data/evidence/engine_collected
  vulnerability_engine:
    paths:
    - /
    - /api
    - /v1/api
    - /graphql
    - /openapi.json
  idor_detection_engine:
    sessions_file: data/sessions.yaml
    evidence_dir: data/evidence/engine
    candidate_urls:
    - https://{target}/v1/api/trading/orders?userId=1001
    - https://{target}/v1/api/trading/positions?accountId=1001
    - https://{target}/v1/api/payments/transactions?accountId=1001
    - https://{target}/v1/api/wallets?userId=1001
    - https://{target}/graphql
  response_diff_engine:
    paths:
    - /api/me
    - /v1/api/profile
    - /v1/api/trading/orders?userId=1001
    - /v1/api/payments/transactions?accountId=1001
    - /graphql
  poc_generator:
    findings_source: data/reports/engine/findings.json
    out_dir: data/reports/engine/poc_auto
  report_builder:
    findings_source: data/reports/engine/findings.json
    out_dir: data/reports/engine/bug_reports
    min_risk: 55
  report_synthesis:
    out_dir: data/reports
    confidence_threshold: 78
    require_replayable_requests: true
    allow_root_endpoint: false
    exclude_categories:
    - js_information_leak
    exclude_source_plugins:
    - deep_js_intelligence
