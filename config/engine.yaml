runtime:
  concurrency: 6
  timeout_seconds: 45
  task_timeout_seconds: 240
  batch_heartbeat_seconds: 15
  plugin_metrics_enabled: true
  plugin_profile: full
  seed_plugins:
  - asset_discovery_engine
  - recon_engine
  - surface_massive
  - surface_mapper
  - surface_expansion
  - hidden_route_discovery
  - hidden_route_detector
  - crawler_intelligent
  - intelligent_crawler
  - deep_js_intelligence
  - deep_js_analyzer
  - javascript_deep_analysis
  - js_route_mapper
  - parameter_enum
  - undocumented_api
  - graphql_scan
  - cors
  - takeover
  adaptive_levels:
    enabled: true
    min_level: 1
    max_level: 3
    start_level: 1
    escalate_after_clean_rounds: 1
    demote_on_feedback: true
    demote_on_timeout: true
  rate_limit_per_sec: 10
  global_http_rate_limit_per_sec: 10
  global_http_max_inflight: 10
  endpoint_cache_enabled: true
  endpoint_cache_ttl_hours: 24
  endpoint_cache_max_entries: 50000
  persist_tasks: true
  task_store_backend: auto
  task_store_path: data/processed/task_queue.db
  default_plugins:
  - recon
  - fingerprint
  - scan
  - cors
  - takeover
  - playwright_capture
  - business_logic_sniper
  - race_condition_turbo
  scope_enforce_http: true
  scope_allowlist_patterns: []
  programs_file: config/programs.yaml
  attack_chain_config: attack_pipeline.yaml
  modules_spec_path: modules_spec.json
  findings_schema_path: findings.schema.json
  config_validation_enabled: true
  config_validation_strict: false
  findings_validation_strict: false
  findings_retention_hours: 0
  evidence_retention_hours: 0
  reports_retention_hours: 0
  allowed_hours_sleep_cap_seconds: 300
  attack_chain_seed_enabled: true
  attack_chain_seed_max_endpoints: 80
  attack_chain_auto_run: true
  endpoint_noise_patterns: []
  priority_endpoint_patterns:
  - "admin"
  - "internal"
  - "v1/debug"
  - "config"
  - "staging"
  - "export"
  - "graphiql"
  priority_endpoint_boost: 12
  roi_endpoint_patterns:
  - "payment"
  - "billing"
  - "checkout"
  - "transfer"
  - "withdraw"
  - "balance"
  - "wallet"
  - "payout"
  - "refund"
  - "invoice"
  - "kyc"
  roi_endpoint_boost: 18
  roi_plugin_boosts:
    business_logic_sniper: 20
    differential_auth_prover: 16
    auth_matrix_engine: 14
    logic_prover: 12
    parameter_intelligence: 6
  roi_boost_cap: 30
  auto_mute_enabled: true
  auto_mute_window_seconds: 120
  auto_mute_event_threshold: 6
  auto_mute_seconds: 900
  per_target_inflight: 2
  per_target_jitter_ms: 80
  delta_priority_min_score: 35
  delta_priority_window_seconds: 900
  findings_flush_every: 200
  max_retries: 2
  backoff_base_seconds: 1.2
  task_queue_size: 4000
  enable_recursive_tasks: true
  recursion_max_depth: 6
  recursion_max_tasks: 800
  recursion_max_tasks_step: 200
  recursion_max_tasks_cap: 6000
  max_rounds_per_target: 30
  max_tasks_per_target: 5000
  feedback_max_retries: 2
  feedback_base_delay_seconds: 1.5
  feedback_max_delay_seconds: 28
  feedback_streak_threshold: 3
  feedback_hard_pause_seconds: 60
  stealth_mode: true
  proxies: []
  user_agents:
  - Mozilla/5.0 (compatible; Pinguinho/1.0; +https://hunterops.local)
  - Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0
    Safari/537.36
  - Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Firefox/121.0
  wordlists:
    default: wordlists/common.txt
  target_allowlist_patterns:
  - "*.backend-capital.com"
  - "payment.backend-capital.com"
  - "*.capital.com"
  - "open-api.capital.com"
  target_denylist_patterns:
  - "aff.capital.com"
  - "go.capital.com"
  - "register.capital.com"
  - "careers.capital.com"
  - "*.affiliates.backend-capital.com"
  - "*.eduapp.backend-capital.com"
  - "*.education.backend-capital.com"
  - "help.capital.com"
  - "relocate-with-us.capital.com"
  - "3cxby.itcapital.io"
  - "texis.itcapital.io"
  target_priority_patterns:
  - "payment.backend-capital.com"
  - "*.backend-capital.com"
  - "*.capital.com"
  allowed_plugins:
  - attack_chain_seed
  - asset_discovery_engine
  - recon_engine
  - surface_massive
  - crawler_intelligent
  - intelligent_crawler
  - deep_js_intelligence
  - deep_js_analyzer
  - javascript_deep_analysis
  - hidden_route_discovery
  - hidden_route_detector
  - surface_expansion
  - parameter_enum
  - js_route_mapper
  - surface_mapper
  - undocumented_api
  - graphql_scan
  - scan
  - cors
  - takeover
  - parameter_intelligence
  - auth_matrix_engine
  - differential_auth_prover
  - business_logic_sniper
  - logic_prover
  - entity_cross_pollinator
  - vulnerability_correlation_engine
  - report_synthesis
  - security_report_builder
  - evidence_packager
  blocked_plugins:
  - race_condition_turbo
app:
  default_root: /opt/hunterops
  root_env: HUNTEROPS_HOME
bootstrap:
  force_stdio_flush: true
  pipeline_log_file: data/pipeline.log
  startup_write_check_dir: data
triage:
  actionable_min_severity: high
  actionable_min_confidence: 80
  actionable_min_impact: 65
  actionable_require_known_endpoint: true
  actionable_disallow_root_endpoint: true
  alert_min_severity: high
  alert_min_confidence: 82
  alert_require_known_endpoint: true
  alert_disallow_root_endpoint: true
  alert_require_actionable: true
  fastlane_low_medium: true
  fastlane_categories:
  - information_disclosure
  - info_leak
  - open_redirect
  - cors
  - misconfiguration
  - source_map
  - path_disclosure
  - idor_response_discrepancy
  - subdomain_takeover
  allow_correlation_alerts: false
  allow_correlation_submission: false
  correlation_min_confidence: 88
feedback:
  file: data/processed/feedback_weights.json
program_packs:
  file: config/program_packs.yaml
storage:
  postgres:
    enabled: true
    required: true
    dsn_env: HUNTEROPS_POSTGRES_DSN
  redis:
    enabled: true
    required: false
    url_env: HUNTEROPS_REDIS_URL
    host_env: REDIS_HOST
    port_env: REDIS_PORT
    host: redis
    port: 6379
    connect_timeout_seconds: 2.0
http_pool:
  max_connections: 160
  max_keepalive_connections: 48
  keepalive_expiry: 10.0
  verify_ssl: true
  http2: false
  retries: 1
  linux_socket_tuning: true
metrics:
  enabled: true
  port: 9108
