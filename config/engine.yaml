runtime:
  concurrency: 10
  timeout_seconds: 30
  rate_limit_per_sec: 5
  max_retries: 2
  backoff_base_seconds: 1.2
  task_queue_size: 4000
  enable_recursive_tasks: true
  recursion_max_depth: 5
  recursion_max_tasks: 800
  recursion_max_tasks_step: 200
  recursion_max_tasks_cap: 6000
  feedback_max_retries: 2
  feedback_base_delay_seconds: 1.5
  feedback_max_delay_seconds: 28
  feedback_streak_threshold: 3
  feedback_hard_pause_seconds: 60
  stealth_mode: true
  proxies: []
  user_agents:
    - "Mozilla/5.0 (compatible; Pinguinho/1.0; +https://hunterops.local)"
    - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
    - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Firefox/121.0"
  wordlists:
    default: "wordlists/common.txt"

app:
  default_root: "/opt/hunterops"
  root_env: "HUNTEROPS_HOME"

feedback:
  file: "data/processed/feedback_weights.json"

program_packs:
  file: "config/program_packs.yaml"

storage:
  postgres:
    enabled: true
    dsn_env: "HUNTEROPS_POSTGRES_DSN"

http_pool:
  max_connections: 160
  max_keepalive_connections: 48
  keepalive_expiry: 10.0
  verify_ssl: true
  http2: false
  retries: 1
  linux_socket_tuning: true

plugins:
  - module: platform_sync
    enabled: false
  - module: polyglot_stack
    enabled: true
  - module: cve_intel
    enabled: true
  - module: cve_matcher
    enabled: true
  - module: asset_discovery_engine
    enabled: true
  - module: recon_engine
    enabled: true
  - module: surface_massive
    enabled: true
  - module: crawler_intel
    enabled: true
  - module: crawler_intelligent
    enabled: true
  - module: intelligent_crawler
    enabled: true
  - module: javascript_deep_analysis
    enabled: true
  - module: deep_js_analyzer
    enabled: true
  - module: deep_js_intelligence
    enabled: true
  - module: hidden_route_discovery
    enabled: true
  - module: hidden_route_detector
    enabled: true
  - module: parameter_enum
    enabled: true
  - module: surface_expansion
    enabled: true
  - module: js_route_mapper
    enabled: true
  - module: surface_mapper
    enabled: true
  - module: attack_graph_builder
    enabled: true
  - module: parameter_intelligence
    enabled: true
  - module: differential_auth_prover
    enabled: true
  - module: logic_prover
    enabled: true
  - module: auth_matrix_engine
    enabled: true
  - module: entity_cross_pollinator
    enabled: true
  - module: smart_payload_engine
    enabled: true
  - module: context_aware_fuzzing_engine
    enabled: true
  - module: behavioral_diff_engine
    enabled: true
  - module: idor_intelligence
    enabled: true
  - module: vulnerability_detection_engine
    enabled: true
  - module: vulnerability_correlation_engine
    enabled: true
  - module: evidence_collector
    enabled: true
  - module: vulnerability_engine
    enabled: true
  - module: idor_detection_engine
    enabled: true
  - module: response_diff_engine
    enabled: true
  - module: poc_generator
    enabled: true
  - module: report_builder
    enabled: true
  - module: report_synthesis
    enabled: true
  - module: evidence_packager
    enabled: true
  - module: security_report_builder
    enabled: true
  - module: recon
    enabled: true
  - module: fingerprint
    enabled: true
  - module: sensitive_endpoints
    enabled: true
  - module: undocumented_api
    enabled: true
  - module: graphql_scan
    enabled: true
  - module: fuzz
    enabled: true
  - module: fuzz_smart
    enabled: true
  - module: scan
    enabled: true
  - module: sensitive_data
    enabled: true
  - module: auth_compare
    enabled: true
  - module: idor_auto
    enabled: true
  - module: role_access
    enabled: true
  - module: auth_token_tests
    enabled: true
  - module: race_basic
    enabled: true
  - module: payment_logic
    enabled: true
  - module: business_logic_sniper
    enabled: true
  - module: race_condition_turbo
    enabled: true
  - module: deep_endpoint
    enabled: true
  - module: stateful_flows
    enabled: true
  - module: cors
    enabled: true
  - module: takeover
    enabled: true
  - module: playwright_capture
    enabled: true

modules:
  asset_discovery_engine:
    subdomain_prefixes: ["www", "api", "app", "admin", "staging", "dev"]
    allowed_scope_suffixes: ["example.com"]
  recon_engine:
    seed_paths:
      - "/"
      - "/login"
      - "/api"
      - "/docs"
    max_pages: 15
    authenticated_crawling: false
    sessions_file: "data/sessions.yaml"
  surface_massive:
    commands:
      - "subfinder -d {target} -silent"
      - "amass enum -passive -d {target}"
      - "assetfinder --subs-only {target}"
      - "gau {target}"
      - "waybackurls {target}"
      - "katana -u https://{target} -silent"
  crawler_intel:
    commands:
      - "katana -u https://{target} -silent -jc"
      - "hakrawler -url https://{target} -plain"
      - "gospider -s https://{target} -q"
  crawler_intelligent:
    max_pages: 25
    max_depth: 2
  intelligent_crawler:
    max_pages: 20
    max_depth: 2
    crawl_delay_ms: 120
  javascript_deep_analysis:
    max_scripts: 25
    seed_paths:
      - "/"
      - "/app.js"
      - "/main.js"
      - "/static/js/app.js"
  deep_js_analyzer:
    max_scripts: 30
    seed_paths:
      - "/"
      - "/app.js"
      - "/main.js"
      - "/static/js/app.js"
  deep_js_intelligence:
    max_scripts: 30
    entropy_threshold: 3.7
    seed_paths:
      - "/"
      - "/app.js"
      - "/main.js"
      - "/static/js/app.js"
  hidden_route_discovery:
    route_seeds:
      - "/api/"
      - "/api/v1/"
      - "/v1/"
      - "/internal/"
      - "/admin/"
      - "/debug/"
      - "/test/"
      - "/config/"
  hidden_route_detector:
    route_seeds:
      - "/api/"
      - "/api/v1/"
      - "/internal/"
      - "/admin/"
      - "/debug/"
      - "/config/"
    source_paths:
      - "/"
      - "/swagger.json"
      - "/openapi.json"
      - "/api-docs"
      - "/main.js"
      - "/app.js"
  parameter_enum:
    seed_paths:
      - "/"
      - "/search"
      - "/api"
      - "/api/users?id=1"
  surface_expansion:
    seed_endpoints:
      - "/api/users"
      - "/api/orders"
      - "/api/profile"
      - "/api/invoices"
  js_route_mapper:
    max_scripts: 30
  surface_mapper:
    seed_paths:
      - "/"
      - "/api"
      - "/login"
      - "/admin"
      - "/graphql"
      - "/api/users"
  attack_graph_builder:
    findings_source: "data/reports/engine/findings.json"
  parameter_intelligence:
    seed_paths:
      - "/"
      - "/search?q=test"
      - "/api/users?id=1"
      - "/api/orders?order_id=1001"
    evidence_dir: "data/evidence/engine"
    max_safe_probes: 25
  entity_cross_pollinator:
    cross_pollination_depth: 5
    max_entities: 120
    max_endpoints: 180
    fanout_per_endpoint: 4
    max_generated_tasks: 220
    max_probe_requests: 80
    sessions_file: "data/sessions.yaml"
    auth_context_b: "user_b"
    target_plugins:
      - "parameter_intelligence"
      - "differential_auth_prover"
  differential_auth_prover:
    sessions_file: "data/sessions.yaml"
    auth_context_a: "user"
    auth_context_b: "user_b"
    session_owner: "user"
    session_other: "user_b"
    min_structure_similarity_pct: 90
    min_content_similarity_pct: 85
    max_candidates: 80
    max_entities: 120
    max_probes: 90
    high_risk_param_types:
      - "numeric_id"
      - "identifier"
      - "uuid"
      - "token"
  auth_matrix_engine:
    sessions_file: "data/sessions.yaml"
    auth_context_a: "user"
    auth_context_b: "user_b"
    min_structure_similarity_pct: 90
    min_confidence: 50
    verified_threshold: 85
    max_endpoints: 220
    max_probes: 140
    verified_dir: "data/evidence/verified"
  ade_brain:
    evidence_dir: "data/evidence/ade"
    max_spawn_tasks: 220
    max_boundary_candidates: 30
  report_engine:
    enabled: true
    evidence_dir: "data/evidence/ade"
    ready_dir: "data/ready_to_submit"
    state_file: "data/processed/report_engine_state.json"
    auto_submit_h1_draft: false
    draft_endpoint: "https://api.hackerone.com/v1/reports/drafts"
    identifier_env: "H1_API_IDENTIFIER"
    token_env: "H1_API_TOKEN"
  hackerone_sync_engine:
    enabled: false
    strict_sync: false
    graphql_endpoint: "https://api.hackerone.com/graphql"
    sync_interval_seconds: 21600
    sync_key: "h1_public_bounty_scope_sync"
    targets_file: "data/targets/in_scope_hosts.txt"
    exclude_low_signal: false
    min_signal: 0
    attack_graph_confidence: 98
  hackerone_manager:
    enabled: false
    strict_scope_enforcement: true
    base_url: "https://api.hackerone.com/v1"
    api_user_env: "HACKERONE_API_USER"
    api_token_env: "HACKERONE_API_TOKEN"
    program_handles: []
    structured_scope_only: true
    poll_interval_seconds: 900
    scope_cache_file: "data/processed/h1_scope_cache.json"
    default_target_rps: 1.0
  oob_engine:
    enabled: false
    provider: "custom"
    callback_domain_env: "HUNTEROPS_OOB_CALLBACK_DOMAIN"
    poll_url_env: "HUNTEROPS_OOB_POLL_URL"
    api_token_env: "HUNTEROPS_OOB_API_TOKEN"
    callback_domain: ""
    poll_url: ""
    poll_interval_seconds: 30
    max_injections_per_target: 80
    max_concurrent_per_target: 3
    state_file: "data/processed/oob_state.json"
    events_file: "data/processed/oob_events.jsonl"
  smart_payload_engine:
    parameter_source: "data/reports/engine/findings.json"
    out_file: "data/processed/smart_payloads.json"
  context_aware_fuzzing_engine:
    payload_file: "data/processed/smart_payloads.json"
    sessions_file: "data/sessions.yaml"
    max_tests: 80
  behavioral_diff_engine:
    sessions_file: "data/sessions.yaml"
    paths:
      - "/api/me"
      - "/api/profile"
      - "/api/orders?id=1"
      - "/search?q=test"
  idor_intelligence:
    sessions_file: "data/sessions.yaml"
    candidate_urls:
      - "https://{target}/api/users?id=1"
      - "https://{target}/api/orders?order_id=1001"
      - "https://{target}/api/invoices?invoice_id=1001"
  vulnerability_detection_engine:
    findings_source: "data/reports/engine/findings.json"
  vulnerability_correlation_engine:
    findings_source: "data/reports/engine/findings.json"
  evidence_collector:
    findings_source: "data/reports/engine/findings.json"
    out_dir: "data/evidence/engine_collected"
  vulnerability_engine:
    paths:
      - "/"
      - "/api"
      - "/debug"
      - "/admin"
      - "/download?file=report.pdf"
      - "/redirect?next=/dashboard"
  idor_detection_engine:
    sessions_file: "data/sessions.yaml"
    evidence_dir: "data/evidence/engine"
    candidate_urls:
      - "https://{target}/api/users?id=1"
      - "https://{target}/api/orders?order_id=1001"
      - "https://{target}/api/invoices?invoice_id=1001"
  response_diff_engine:
    paths:
      - "/api/me"
      - "/api/profile"
      - "/api/orders?id=1"
      - "/search?q=test"
  poc_generator:
    findings_source: "data/reports/engine/findings.json"
    out_dir: "data/reports/engine/poc_auto"
  report_builder:
    findings_source: "data/reports/engine/findings.json"
    out_dir: "data/reports/engine/bug_reports"
    min_risk: 55
  report_synthesis:
    out_dir: "data/reports"
    confidence_threshold: 80
    auth_context_a: "Auth_Context_A"
    auth_context_b: "Auth_Context_B"
    enable_notifications: true
    enable_os_notification: true
    webhook_env: "HUNTEROPS_CRITICAL_WEBHOOK"
    webhook_url: ""
  discord_notifier:
    enabled: true
    bot_name: "Pinguinho"
    recon_webhook_url: ""
    findings_webhook_url: ""
    recon_webhook_env: "HUNTEROPS_DISCORD_RECON_WEBHOOK"
    findings_webhook_env: "HUNTEROPS_DISCORD_FINDINGS_WEBHOOK"
    timeout_seconds: 4
    max_concurrent: 4
    send_startup_check: true
  alert_router:
    enabled: true
    timeout_seconds: 5
    dedupe_ttl_seconds: 1800
    max_embed_poc_chars: 1100
    discord_attach_threshold: 1200
    discord_max_attachment_bytes: 7000000
    discord_research_webhook: ""
    discord_critical_webhook: ""
    discord_research_env: "HUNTEROPS_DISCORD_RESEARCH_WEBHOOK"
    discord_critical_env: "HUNTEROPS_DISCORD_CRITICAL_WEBHOOK"
    slack_research_webhook: ""
    slack_critical_webhook: ""
    slack_research_env: "HUNTEROPS_SLACK_RESEARCH_WEBHOOK"
    slack_critical_env: "HUNTEROPS_SLACK_CRITICAL_WEBHOOK"
    report_url_base: ""
  logic_prover:
    sessions_file: "data/sessions.yaml"
    auth_context_a: "user"
    auth_context_b: "user_b"
    min_structure_similarity_pct: 90
    max_candidates: 90
    max_depth: 3
  evidence_packager:
    out_dir: "data/evidence/bundles"
    confidence_threshold: 80
  security_report_builder:
    findings_source: "data/reports/engine/findings.json"
    out_dir: "data/reports/engine/security_reports"
  recon:
    commands:
      - "subfinder -d {target} -silent"
      - "amass enum -passive -d {target}"
      - "assetfinder --subs-only {target}"
      - "gau {target}"
      - "waybackurls {target}"
  fingerprint:
    commands:
      - "httpx -u https://{target} -silent -status-code -title -tech-detect"
  fuzz:
    commands:
      - "ffuf -w {wordlist} -u https://{target}/FUZZ -mc 200,204,301,302,307,401,403"
  scan:
    commands:
      - "nuclei -u https://{target} -silent -severity critical,high,medium -t templates/nuclei"
  fuzz_smart:
    commands:
      - "ffuf -w {wordlist} -u https://{target}/FUZZ -mc 200,201,202,204,301,302,307,401,403 -of json -o -"
  auth_compare:
    sessions_file: "data/sessions.yaml"
    evidence_dir: "data/evidence/engine"
    paths:
      - "/api/me"
      - "/api/profile"
      - "/api/users"
  idor_auto:
    sessions_file: "data/sessions.yaml"
    evidence_dir: "data/evidence/engine"
    candidate_urls:
      - "https://{target}/api/profile?id=1"
      - "https://{target}/api/invoices?invoice_id=1001"
  role_access:
    sessions_file: "data/sessions.yaml"
    evidence_dir: "data/evidence/engine"
    role_order: ["user", "admin"]
    paths:
      - "/admin"
      - "/api/admin/users"
  auth_token_tests:
    sessions_file: "data/sessions.yaml"
    evidence_dir: "data/evidence/engine"
    path: "/api/me"
  race_basic:
    paths:
      - "/api/coupon/apply"
      - "/api/wallet/redeem"
      - "/api/plan/upgrade"
  payment_logic:
    enabled: true
  business_logic_sniper:
    base_scheme: "https"
    sessions_file: "data/sessions.yaml"
    auth_context_a: "user"
    auth_context_b: "user_b"
    seed_paths:
      - "/api/cart?price=100&quantity=1"
      - "/api/checkout?amount=100&currency=USD"
      - "/api/coupon/apply?coupon=WELCOME10&total=100"
  race_condition_turbo:
    base_scheme: "https"
    sessions_file: "data/sessions.yaml"
    auth_context: "user"
    burst_size: 24
    max_candidates: 12
    variance_threshold_ms: 50.0
    seed_paths:
      - "/api/wallet/withdraw?amount=1"
      - "/api/redeem?amount=1"
      - "/api/transfer?amount=1"
  deep_endpoint:
    paths:
      - "/api/profile"
      - "/api/orders"
      - "/api/invoices"
  stateful_flows:
    sessions_file: "data/sessions.yaml"
    evidence_dir: "data/evidence/engine"
    flows:
      - name: checkout
        steps: ["/api/cart", "/api/checkout", "/api/payment/confirm"]
      - name: upgrade
        steps: ["/api/plan/current", "/api/plan/upgrade", "/api/plan/confirm"]
      - name: reset
        steps: ["/api/password/request-reset", "/api/password/confirm-reset"]
      - name: approval
        steps: ["/api/request/create", "/api/request/approve"]
  sensitive_data:
    paths:
      - "/api/me"
      - "/api/profile"
      - "/api/users"
  polyglot_stack:
    commands:
      - "node tools/node/spa_probe.mjs {target}"
      - "cargo run --manifest-path tools/rust-analyzer/Cargo.toml --quiet -- {target}"
      - "java -cp tools/jvm ApiSurfaceInspector {target}"
      - "kotlinc -script tools/jvm/RoleDiffInspector.kt {target}"
      - "Rscript tools/r/analytics.R data/findings/submissions.jsonl"
  cve_intel:
    catalog_file: "data/processed/cve_catalog.json"
  cve_matcher:
    catalog_file: "data/processed/cve_catalog.json"
    probe_paths:
      - "/"
      - "/api"
      - "/graphql"
      - "/.well-known/security.txt"
    min_token_matches: 2
    top_n: 8
